<!DOCTYPE html>
<html>

<head>
  <title>Uusi ilmoitus</title>
</head>

<body>
  <h1>Uusi ilmoitus</h1>
  <form action="/create_item" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <p>
      Otsikko: <br />
      <input type="text" name="title" />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="8" cols="60"></textarea>
    </p>
    <p>
      Päivämäärä: <br />
      <input type="date" name="event_date" />
    </p>
    <p>
      Kategoria: <br />
      <select name="category">
        <option value="">Valitse kategoria</option>
        {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </p>
    <p>
      Pelivuoron aika: <br />
      klo: <input type="text" name="start_time" pattern="^(([01]?[0-9]|2[0-3]):?[0-5][0-9])$" placeholder="esim. 1400 tai 14:00" />
    </p>
    <input type="submit" value="Luo ilmoitus" />
  </form>
  <p><a href="/">Takaisin etusivulle</a></p>
</body>

</html>

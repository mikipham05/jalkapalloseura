<!DOCTYPE html>
<html>

<head>
  <title>Ilmoituksen muokkaus</title>
</head>

<body>
  <h1>Ilmoituksen muokkaus</h1>
  <form action="/update_item" method="post">
    <p>
      Otsikko: <br />
      <input type="text" name="title" value="{{ item.title }}" />
    </p>
    <p>
      Kuvaus: <br />
      <textarea name="description" rows="8" cols="60">{{ item.description }}</textarea>
    </p>
    <p>
      Päivämäärä: <br />
      <input type="date" name="event_date" value="{{ item.event_date }}" />
    </p>
    <p>
      Pelivuoron aika: <br />
      klo: <input type="text" name="start_time" size="10" value="{{ item.start_time }}" />
    </p>
    <input type="hidden" name="item_id" value="{{ item.id }}" />
    <input type="submit" value="Päivitä ilmoitus" />
  </form>
</body>

</html>
